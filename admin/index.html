<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OperixERP — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0C10;--bg2:#111318;--surface:#1E2229;--surface2:#252A33;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#EEF0F8;--text2:#7A8099;--text3:#454B5E;
  --accent:#5B6EF5;--accent2:#7B8EFF;--glow:rgba(91,110,245,0.18);
  --green:#0FD97E;--gbg:rgba(15,217,126,0.09);
  --red:#FF4D6A;--rbg:rgba(255,77,106,0.09);
  --yellow:#F5C842;--ybg:rgba(245,200,66,0.09);
  --blue:#3AB4FF;--bbg:rgba(58,180,255,0.09);
  --r:10px;--r2:14px;--font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.hidden{display:none!important}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--r);border:none;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border2)}.btn-outline:hover{border-color:var(--accent);color:var(--accent2)}
.btn-success{background:var(--gbg);color:var(--green);border:1px solid rgba(15,217,126,0.2)}
.btn-danger{background:var(--rbg);color:var(--red);border:1px solid rgba(255,77,106,0.2)}
.btn-warn{background:var(--ybg);color:var(--yellow);border:1px solid rgba(245,200,66,0.2)}
.btn-ghost{background:var(--surface);color:var(--text2);border:none}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:8px}

.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:700}
.badge-green{background:var(--gbg);color:var(--green)}.badge-red{background:var(--rbg);color:var(--red)}
.badge-yellow{background:var(--ybg);color:var(--yellow)}.badge-blue{background:var(--bbg);color:var(--blue)}
.badge-accent{background:var(--glow);color:var(--accent2)}.badge-gray{background:var(--surface2);color:var(--text2)}

.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 13px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group input::placeholder{color:var(--text3)}

/* LOGIN */
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(91,110,245,0.1) 0%,transparent 60%)}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,0.5);animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.login-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;box-shadow:0 6px 24px var(--glow)}
.login-title{text-align:center;font-size:20px;font-weight:800;margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--text2);margin-bottom:24px}
.login-err{background:var(--rbg);color:var(--red);border:1px solid rgba(255,77,106,0.2);border-radius:var(--r);padding:10px 13px;font-size:13px;margin-bottom:12px}

/* SHELL */
#shell{display:none}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px}
.topbar-title{font-size:15px;font-weight:800}
.topbar-badge{background:var(--rbg);color:var(--red);font-size:11px;font-weight:700;padding:3px 8px;border-radius:100px;border:1px solid rgba(255,77,106,0.2)}
.topbar-right{display:flex;align-items:center;gap:12px}
.admin-name{font-size:13px;color:var(--text2)}
.logout-btn{background:var(--rbg);color:var(--red);border:1px solid rgba(255,77,106,0.2);border-radius:var(--r);padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer}

.main{max-width:1200px;margin:0 auto;padding:28px 24px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-icon{font-size:22px}
.stat-trend{font-size:11px;font-weight:700;padding:3px 7px;border-radius:100px}
.stat-trend.up{background:var(--gbg);color:var(--green)}.stat-trend.down{background:var(--rbg);color:var(--red)}
.stat-label{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-value{font-size:28px;font-weight:800;font-family:var(--mono)}

/* CHART */
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:24px}
.chart-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chart-title{font-size:15px;font-weight:700}
.chart-wrap{height:200px;position:relative}

/* TABLE */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:24px}
.table-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.table-title{font-size:15px;font-weight:700}
.table-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-inp{padding:8px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:100px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color 0.2s;width:200px}
.search-inp:focus{border-color:var(--accent)}
.filter-sel{padding:8px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:100px;color:var(--text);font-family:var(--font);font-size:13px;outline:none}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface)}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
td{padding:12px 16px;font-size:13px;border-top:1px solid var(--border)}
tr:hover td{background:rgba(255,255,255,0.02)}
.td-biz{font-weight:700;font-size:14px}
.td-slug{font-family:var(--mono);font-size:12px;color:var(--accent2)}
.td-slug a{color:inherit;text-decoration:none}
.td-slug a:hover{text-decoration:underline}
.td-actions{display:flex;gap:6px;flex-wrap:wrap}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-overlay.hidden{display:none!important}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:fadeUp 0.2s ease}
.modal-hd{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:800}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:none;color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px 24px}
.modal-footer{padding:0 24px 20px;display:flex;gap:10px}
.modal-footer .btn{flex:1}

/* TOAST */
#toasts{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:100px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.4);white-space:nowrap;animation:fadeUp 0.2s ease}
.toast.success{background:var(--gbg);border-color:rgba(15,217,126,0.2);color:var(--green)}
.toast.error{background:var(--rbg);border-color:rgba(255,77,106,0.2);color:var(--red)}
.toast.warn{background:var(--ybg);border-color:rgba(245,200,66,0.2);color:var(--yellow)}

#loadingOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:9998;display:flex;align-items:center;justify-content:center}
.spinner{width:44px;height:44px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.expiry-warn{background:var(--ybg);border:1px solid rgba(245,200,66,0.2);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--yellow);margin-bottom:20px;display:flex;align-items:center;gap:8px}

/* plan colors */
.plan-free{background:var(--surface2);color:var(--text2)}
.plan-trial{background:var(--bbg);color:var(--blue)}
.plan-paid{background:var(--gbg);color:var(--green)}
.plan-blocked{background:var(--rbg);color:var(--red)}

/* Negocio detail panel */
.neg-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.neg-panel-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}

@media(max-width:768px){
  .stats-row{grid-template-columns:1fr 1fr}
  .main{padding:16px}
  th:nth-child(n+4),td:nth-child(n+4){display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-icon">🛡️</div>
    <div class="login-title">Panel Administrador</div>
    <div class="login-sub">OperixERP</div>
    <div id="loginErr" class="login-err hidden"></div>
    <div class="form-group"><label>Email</label><input type="email" id="adminEmail" placeholder="admin@operixerp.cloud" autocomplete="username"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" style="width:100%;padding:13px" id="loginBtn">Ingresar al panel</button>
  </div>
</div>

<!-- SHELL -->
<div id="shell">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">🛡️</div>
      <div class="topbar-title">OperixERP Admin</div>
      <span class="topbar-badge" id="topAlertBadge" style="display:none">⚠ vencimientos</span>
    </div>
    <div class="topbar-right">
      <span class="admin-name" id="adminName"></span>
      <button class="logout-btn" id="logoutBtn">🚪 Salir</button>
    </div>
  </div>

  <div class="main">
    <!-- Expiry alerts -->
    <div id="expiryAlert" class="expiry-warn hidden">
      ⚠ <span id="expiryMsg"></span>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-top"><span class="stat-icon">🏪</span><span class="stat-trend up" id="statTrendNegocios">+0</span></div>
        <div class="stat-label">Negocios</div>
        <div class="stat-value" id="statNegocios">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><span class="stat-icon">✅</span></div>
        <div class="stat-label">Activos</div>
        <div class="stat-value green" id="statActivos">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><span class="stat-icon">💎</span></div>
        <div class="stat-label">Pagados</div>
        <div class="stat-value accent" id="statPagados">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><span class="stat-icon">⏳</span></div>
        <div class="stat-label">Trial / Free</div>
        <div class="stat-value yellow" id="statTrial">0</div>
      </div>
    </div>

    <!-- Growth chart -->
    <div class="chart-card">
      <div class="chart-hd">
        <div class="chart-title">Crecimiento — Últimos 30 días</div>
        <button class="btn btn-ghost btn-sm" id="refreshBtn">↻ Actualizar</button>
      </div>
      <div class="chart-wrap"><canvas id="growthChart"></canvas></div>
    </div>

    <!-- Negocios table -->
    <div class="table-card">
      <div class="table-hd">
        <div class="table-title">Negocios <span id="negCount" style="font-size:13px;color:var(--text2);font-weight:500"></span></div>
        <div class="table-controls">
          <input type="text" class="search-inp" id="negSearch" placeholder="🔍 Buscar...">
          <select class="filter-sel" id="planFilter">
            <option value="">Todos los planes</option>
            <option value="free">Free</option>
            <option value="trial">Trial</option>
            <option value="paid">Pagado</option>
            <option value="blocked">Bloqueado</option>
          </select>
          <button class="btn btn-primary btn-sm" id="refreshTableBtn">↻</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Negocio</th>
              <th>Plan</th>
              <th>Suscripción</th>
              <th>Slug</th>
              <th>Registro</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="negTable"></tbody>
        </table>
      </div>
      <div id="negEmpty" class="hidden" style="text-align:center;padding:40px;color:var(--text3)">Sin resultados</div>
    </div>
  </div>
</div>

<!-- MODAL: Gestionar negocio -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <div class="modal-hd">
      <span class="modal-title" id="modalTitle">Gestionar</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div id="toasts"></div>
<div id="loadingOverlay" class="hidden"><div class="spinner"></div></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
'use strict';
const SB = 'https://ebekmlhdrxtloghftbga.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViZWttbGhkcnh0bG9naGZ0YmdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MDc2MjYsImV4cCI6MjA4OTI4MzYyNn0.4T9tYw4neBd6-LYnVV9hLhBUVMqfhQomuqGuf_jHyos';

// Admin credentials (stored in Supabase or hardcoded for simplicity)
const ADMIN_CREDENTIALS = [
  { email: 'admin@operixerp.cloud', password: 'Admin2024!', name: 'Administrador' },
];

const $ = id => document.getElementById(id);
let allNegocios = [];
let growthChart = null;
let adminUser = null;

// ─── UTILS ───────────────────────────────────
async function sb(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', 'apikey': SK, 'Authorization': 'Bearer ' + SK, 'Prefer': 'return=representation', ...(opts.headers || {}) };
  const res = await fetch(SB + path, { ...opts, headers });
  const txt = await res.text();
  try { return { ok: res.ok, status: res.status, data: JSON.parse(txt) }; }
  catch { return { ok: res.ok, status: res.status, data: txt }; }
}

function toast(msg, type = '', dur = 3000) {
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg;
  $('toasts').appendChild(t); setTimeout(() => t.remove(), dur);
}
function showLoad() { $('loadingOverlay').classList.remove('hidden'); }
function hideLoad() { $('loadingOverlay').classList.add('hidden'); }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso) { if (!iso) return '—'; return new Date(iso).toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' }); }
function daysLeft(iso) { if (!iso) return null; return Math.ceil((new Date(iso) - new Date()) / 86400000); }

// ─── AUTH ─────────────────────────────────────
function doLogin() {
  const email = $('adminEmail').value.trim().toLowerCase();
  const pass  = $('adminPass').value.trim();
  const found = ADMIN_CREDENTIALS.find(c => c.email === email && c.password === pass);
  if (!found) { const e = $('loginErr'); e.textContent = 'Credenciales incorrectas'; e.classList.remove('hidden'); return; }
  adminUser = found;
  sessionStorage.setItem('ox_admin', JSON.stringify(found));
  $('loginWrap').style.display = 'none';
  $('shell').style.display = 'block';
  $('adminName').textContent = found.name;
  loadAll();
}

function doLogout() {
  if (!confirm('¿Cerrar sesión?')) return;
  sessionStorage.removeItem('ox_admin');
  $('shell').style.display = 'none';
  $('loginWrap').style.display = 'flex';
  $('adminEmail').value = ''; $('adminPass').value = '';
}

// ─── LOAD DATA ────────────────────────────────
async function loadAll() {
  showLoad();
  try {
    const r = await sb('/rest/v1/negocios?order=created_at.desc&select=*');
    if (!r.ok) { toast('Error al cargar datos', 'error'); return; }
    allNegocios = r.data || [];
    renderStats();
    renderChart();
    renderTable();
    checkExpiry();
  } catch(e) {
    toast('Error de conexión', 'error');
  } finally { hideLoad(); }
}

// ─── STATS ────────────────────────────────────
function renderStats() {
  const total = allNegocios.length;
  const activos = allNegocios.filter(n => n.plan !== 'blocked').length;
  const pagados = allNegocios.filter(n => n.plan === 'paid').length;
  const trial = allNegocios.filter(n => n.plan === 'trial' || n.plan === 'free' || !n.plan).length;

  // New this week
  const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString();
  const newThisWeek = allNegocios.filter(n => n.created_at > weekAgo).length;

  $('statNegocios').textContent = total;
  $('statActivos').textContent = activos;
  $('statPagados').textContent = pagados;
  $('statTrial').textContent = trial;
  $('statTrendNegocios').textContent = '+' + newThisWeek + ' esta semana';
}

// ─── CHART ────────────────────────────────────
function renderChart() {
  const days = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const ds = d.toISOString().slice(0, 10);
    const lbl = d.toLocaleDateString('es-CL', { day: 'numeric', month: 'short' });
    const count = allNegocios.filter(n => n.created_at && n.created_at.slice(0, 10) === ds).length;
    days.push({ lbl, count });
  }

  if (growthChart) growthChart.destroy();
  const ctx = $('growthChart');
  if (!ctx || !window.Chart) return;
  growthChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: days.map(d => d.lbl),
      datasets: [{
        data: days.map(d => d.count),
        borderColor: '#5B6EF5',
        backgroundColor: 'rgba(91,110,245,0.1)',
        tension: 0.4, fill: true, borderWidth: 2,
        pointRadius: 3, pointBackgroundColor: '#5B6EF5'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1, color: '#7A8099' }, grid: { color: 'rgba(255,255,255,0.04)' } },
        x: { ticks: { color: '#7A8099', maxTicksLimit: 10 }, grid: { display: false } }
      }
    }
  });
}

// ─── EXPIRY ALERTS ────────────────────────────
function checkExpiry() {
  const expiring = allNegocios.filter(n => {
    if (!n.suscripcion_fin || n.plan === 'blocked' || n.plan === 'free') return false;
    const dl = daysLeft(n.suscripcion_fin);
    return dl !== null && dl <= 7 && dl >= 0;
  });
  if (expiring.length > 0) {
    $('expiryAlert').classList.remove('hidden');
    $('expiryMsg').textContent = `${expiring.length} negocio(s) vencen en los próximos 7 días: ${expiring.map(n => n.nombre).join(', ')}`;
    $('topAlertBadge').textContent = `⚠ ${expiring.length} vencimiento(s)`;
    $('topAlertBadge').style.display = '';
  } else {
    $('expiryAlert').classList.add('hidden');
    $('topAlertBadge').style.display = 'none';
  }
}

// ─── TABLE ────────────────────────────────────
function renderTable(filterQ = '', filterPlan = '') {
  const q = ($('negSearch').value || filterQ).toLowerCase();
  const plan = $('planFilter').value || filterPlan;

  let filtered = allNegocios.filter(n => {
    const mQ = !q || (n.nombre || '').toLowerCase().includes(q) || (n.email || '').toLowerCase().includes(q) || (n.slug || '').includes(q);
    const mP = !plan || n.plan === plan || (!n.plan && plan === 'free');
    return mQ && mP;
  });

  $('negCount').textContent = `(${filtered.length} de ${allNegocios.length})`;

  const tbody = $('negTable');
  if (!filtered.length) {
    tbody.innerHTML = '';
    $('negEmpty').classList.remove('hidden');
    return;
  }
  $('negEmpty').classList.add('hidden');

  tbody.innerHTML = filtered.map(n => {
    const plan = n.plan || 'free';
    const dl = daysLeft(n.suscripcion_fin);
    const expiryHtml = n.suscripcion_fin
      ? `<div style="font-size:11px;color:${dl !== null && dl <= 7 ? 'var(--red)' : dl !== null && dl <= 30 ? 'var(--yellow)' : 'var(--text3)'}">${dl !== null ? (dl < 0 ? '⚠ Vencida' : dl === 0 ? '⚠ Hoy' : `${dl} días`) : '—'}</div>`
      : '<div style="font-size:11px;color:var(--text3)">Sin fecha</div>';

    return `<tr data-id="${n.id}">
      <td>
        <div class="td-biz">${esc(n.nombre || '—')}</div>
        <div style="font-size:11px;color:var(--text2)">${esc(n.email || '—')}</div>
      </td>
      <td><span class="badge plan-${plan}">${planLabel(plan)}</span></td>
      <td>
        <div style="font-size:12px">${fmtDate(n.suscripcion_inicio)} → ${fmtDate(n.suscripcion_fin)}</div>
        ${expiryHtml}
      </td>
      <td><div class="td-slug"><a href="https://${esc(n.slug || '')}.operixerp.cloud" target="_blank">${esc(n.slug || '—')}</a></div></td>
      <td style="font-size:12px;color:var(--text2)">${fmtDate(n.created_at)}</td>
      <td>
        <div class="td-actions">
          <button class="btn btn-primary btn-sm" data-action="manage" data-id="${n.id}">⚙ Gestionar</button>
          ${n.plan !== 'blocked'
            ? `<button class="btn btn-danger btn-sm" data-action="block" data-id="${n.id}">🚫 Bloquear</button>`
            : `<button class="btn btn-success btn-sm" data-action="unblock" data-id="${n.id}">✅ Activar</button>`
          }
          <button class="btn btn-ghost btn-sm" data-action="wa" data-id="${n.id}" data-nombre="${esc(n.nombre||'')}" data-email="${esc(n.email||'')}">📲 WA</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function planLabel(p) {
  return { free: 'Free', trial: 'Trial', paid: '💎 Pagado', blocked: '🚫 Bloqueado' }[p] || p;
}

// ─── ACTIONS ─────────────────────────────────
async function blockNegocio(id) {
  const neg = allNegocios.find(n => n.id === id);
  if (!confirm(`¿Bloquear "${neg?.nombre}"?`)) return;
  showLoad();
  const r = await sb(`/rest/v1/negocios?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ plan: 'blocked' }) });
  hideLoad();
  if (r.ok) { toast('Bloqueado', 'success'); loadAll(); }
  else toast('Error', 'error');
}

async function unblockNegocio(id) {
  showLoad();
  const r = await sb(`/rest/v1/negocios?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ plan: 'free' }) });
  hideLoad();
  if (r.ok) { toast('Activado', 'success'); loadAll(); }
  else toast('Error', 'error');
}

function sendWA(nombre, email) {
  const msg = `Hola ${nombre}, te contactamos desde OperixERP. ¿Cómo va tu experiencia con el sistema?`;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

// ─── MANAGE MODAL ─────────────────────────────
async function showManage(id) {
  const neg = allNegocios.find(n => n.id === id);
  if (!neg) return;

  // Get user count and last sale for this negocio
  showLoad();
  const [usersR, salesR, prodsR] = await Promise.all([
    sb(`/rest/v1/usuarios?negocio_id=eq.${id}&activo=eq.true&select=nombre,login,rol`),
    sb(`/rest/v1/ventas?negocio_id=eq.${id}&order=created_at.desc&limit=1&select=created_at,total`),
    sb(`/rest/v1/productos?negocio_id=eq.${id}&activo=eq.true&select=id`),
  ]);
  hideLoad();

  const users = usersR.data || [];
  const lastSale = salesR.data?.[0];
  const prodCount = (prodsR.data || []).length;
  const plan = neg.plan || 'free';
  const dl = daysLeft(neg.suscripcion_fin);

  $('modalTitle').textContent = `⚙ ${neg.nombre}`;
  $('modalBody').innerHTML = `
    <!-- Info -->
    <div class="neg-panel">
      <div class="neg-panel-title">Información</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">
        <div><div style="color:var(--text2);font-size:11px;margin-bottom:2px">Email</div><div>${esc(neg.email||'—')}</div></div>
        <div><div style="color:var(--text2);font-size:11px;margin-bottom:2px">Slug</div><div style="font-family:var(--mono);font-size:12px"><a href="https://${esc(neg.slug||'')}.operixerp.cloud" target="_blank" style="color:var(--accent2)">${esc(neg.slug||'—')}</a></div></div>
        <div><div style="color:var(--text2);font-size:11px;margin-bottom:2px">Usuarios</div><div>${users.length}</div></div>
        <div><div style="color:var(--text2);font-size:11px;margin-bottom:2px">Productos</div><div>${prodCount}</div></div>
        <div><div style="color:var(--text2);font-size:11px;margin-bottom:2px">Última venta</div><div>${lastSale ? fmtDate(lastSale.created_at) : 'Nunca'}</div></div>
        <div><div style="color:var(--text2);font-size:11px;margin-bottom:2px">Registro</div><div>${fmtDate(neg.created_at)}</div></div>
      </div>
      ${users.length ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><div style="color:var(--text2);font-size:11px;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Usuarios</div>${users.map(u=>`<div style="font-size:12px;margin-bottom:4px">${esc(u.nombre)} · <span style="color:var(--text2)">${esc(u.login)}</span> · <span class="badge badge-accent" style="font-size:9px">${u.rol}</span></div>`).join('')}</div>` : ''}
    </div>

    <!-- Plan -->
    <div class="neg-panel">
      <div class="neg-panel-title">Plan y suscripción</div>
      <div class="form-group">
        <label>Plan</label>
        <select id="mgPlan">
          <option value="free" ${plan==='free'?'selected':''}>Free</option>
          <option value="trial" ${plan==='trial'?'selected':''}>Trial</option>
          <option value="paid" ${plan==='paid'?'selected':''}>💎 Pagado</option>
          <option value="blocked" ${plan==='blocked'?'selected':''}>🚫 Bloqueado</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>Inicio suscripción</label><input type="date" id="mgStart" value="${neg.suscripcion_inicio?neg.suscripcion_inicio.slice(0,10):''}"></div>
        <div class="form-group"><label>Fin suscripción</label><input type="date" id="mgEnd" value="${neg.suscripcion_fin?neg.suscripcion_fin.slice(0,10):''}"></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn btn-ghost btn-sm" onclick="setDuration(1)">+1 mes</button>
        <button class="btn btn-ghost btn-sm" onclick="setDuration(3)">+3 meses</button>
        <button class="btn btn-ghost btn-sm" onclick="setDuration(6)">+6 meses</button>
        <button class="btn btn-ghost btn-sm" onclick="setDuration(12)">+1 año</button>
      </div>
      ${dl !== null ? `<div style="font-size:12px;color:${dl <= 7 ? 'var(--red)' : dl <= 30 ? 'var(--yellow)' : 'var(--green)'};margin-bottom:12px">${dl < 0 ? '⚠ Suscripción vencida' : dl === 0 ? '⚠ Vence hoy' : `✓ ${dl} días restantes`}</div>` : ''}
      <div class="form-group"><label>Notas internas</label><textarea id="mgNotes" rows="2" placeholder="Observaciones, pagos, contacto...">${esc(neg.notas_admin||'')}</textarea></div>
    </div>`;

  $('modalFooter').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveManage('${id}')">💾 Guardar</button>`;

  $('modal').classList.remove('hidden');
}

function setDuration(months) {
  const start = $('mgStart').value || new Date().toISOString().slice(0, 10);
  const d = new Date(start);
  d.setMonth(d.getMonth() + months);
  $('mgEnd').value = d.toISOString().slice(0, 10);
  if (!$('mgStart').value) $('mgStart').value = new Date().toISOString().slice(0, 10);
}

async function saveManage(id) {
  const plan = $('mgPlan').value;
  const start = $('mgStart').value || null;
  const end = $('mgEnd').value || null;
  const notes = $('mgNotes').value.trim();
  showLoad();
  const r = await sb(`/rest/v1/negocios?id=eq.${id}`, {
    method: 'PATCH',
    body: JSON.stringify({ plan, suscripcion_inicio: start, suscripcion_fin: end, notas_admin: notes })
  });
  hideLoad();
  if (r.ok) { toast('Actualizado', 'success'); closeModal(); loadAll(); }
  else toast('Error al guardar', 'error');
}

function closeModal() {
  $('modal').classList.add('hidden');
  $('modalBody').innerHTML = '';
  $('modalFooter').innerHTML = '';
}

// ─── EVENTS ──────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Session restore
  const saved = sessionStorage.getItem('ox_admin');
  if (saved) {
    try {
      adminUser = JSON.parse(saved);
      $('loginWrap').style.display = 'none';
      $('shell').style.display = 'block';
      $('adminName').textContent = adminUser.name;
      loadAll();
    } catch { sessionStorage.removeItem('ox_admin'); }
  }

  $('loginBtn').addEventListener('click', doLogin);
  $('adminPass').addEventListener('keypress', e => e.key === 'Enter' && doLogin());
  $('logoutBtn').addEventListener('click', doLogout);
  $('refreshBtn').addEventListener('click', loadAll);
  $('refreshTableBtn').addEventListener('click', loadAll);
  $('negSearch').addEventListener('input', () => renderTable());
  $('planFilter').addEventListener('change', () => renderTable());
  $('modalClose').addEventListener('click', closeModal);
  $('modal').addEventListener('click', e => { if (e.target === $('modal')) closeModal(); });

  // Table event delegation
  $('negTable').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    const action = btn.dataset.action;
    if (action === 'manage') showManage(id);
    else if (action === 'block') blockNegocio(id);
    else if (action === 'unblock') unblockNegocio(id);
    else if (action === 'wa') sendWA(btn.dataset.nombre, btn.dataset.email);
  });
});

// globals for inline onclick
window.closeModal = closeModal;
window.saveManage = saveManage;
window.setDuration = setDuration;
</script>
</body>
</html>
